<!DOCTYPE html>
<html lang="en" data-theme = 'light'>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


       <!-- tailwind daisy Ui -->
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
      
        <!-- Font Awesome -->

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


        <!-- font -outfit -->
         <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
          
        <!-- favicon link -->
        <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">
        <title>Payoo | Home</title>

        <style>
          *{
              font-family: "Outfit", sans-serif;
          }
        </style>
   
</head>   


<body class="min-h-screen max-w-md mx-auto bg-base-200">
      

  <header class="border-b-2 border-gray-400 py-3 sticky top-0 bg-base-200 z-10">


    <section class="w-11/12 mx-auto  flex justify-between items-center">


     <div class="left flex gap-1">
        <div class="logo w-[60px]">
            <img src="./assets/logo.png" alt="">
        </div>

        
        <div class="balance-info">

   <h2 class="text-2xl text-neutral font-bold">$ <span id="balance">4500</span></h2>
     
   <p class="text-neutral/50">Available Balance</p>


        </div>

     </div>
     <div class="right">

    <a href="/index.html" class="btn bg-base-200 rounded-lg text-neutral/50 shadow"><i class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a>

     </div>






    </section>

  </header>



  <section class="w-11/12  mx-auto py-3 space-y-5 ">
    


    <h2 class="text-2xl font-bold">Welcome to Pay<span class="text-primary">oo</span></h2>
    <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and</p>
 


    <div class="btn-container grid grid-cols-3 gap-3">


  <div class="btn btn-primary btn-soft flex-col h-full py-4">
    <img src="./assets/opt-1.png" alt="">
    <p class="opacity-50">Add Money</p>
  </div>
  <div class="btn btn-primary btn-soft flex-col h-full py-4">
    <img src="./assets/opt-2.png" alt="">
    <p class="opacity-50">Cashout</p>
  </div>
  <div class="btn btn-primary btn-soft flex-col h-full py-4">
    <img src="./assets/opt-3.png" alt="">
    <p class="opacity-50">Transfer Money</p>
  </div>
  <div class="btn btn-primary btn-soft flex-col h-full py-4">
    <img src="./assets/opt-4.png" alt="">
    <p class="opacity-50">Get Bonus</p>
  </div>
  <div class="btn btn-primary btn-soft flex-col h-full py-4">
    <img src="./assets/opt-5.png" alt="">
    <p class="opacity-50">Pay Bill</p>
  </div>
  <div class="btn btn-primary btn-soft flex-col h-full py-4">
    <img src="./assets/opt-6.png" alt="">
    <p class="opacity-50">Transactions</p>
  </div>

    </div>



  </section>



  <section class="w-11/12  mx-auto py-8">

    <h2 class="text-xl font-bold text-neutral/70">Cashout</h2>

    <div class="card bg-base-100 w-full   shadow  mt-4 rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label font-bold text-/70 ">Agent Number</label>
          <input value="01234567890" id="cashout-number" type="number" maxlength="11" minlength="11" class="input rounded-full bg-base-200 w-full" placeholder="Type your Agent 11 digit Number" />

          <br>
          <label class="label font-bold text-/70 ">Amount</label>
          <input  id="cashout-amount" type="number" class="input rounded-full bg-base-200 w-full" placeholder="Enter amount to withdraw" />

          <br>

          <label class="label font-bold text-neutral/70">4 Digit Pin</label>
          <input id="cashout-pin"  type="password" maxlength="4" class="input rounded-full bg-base-200 w-full" placeholder="Enter your 4 digit pin" />
          
          <button  id="cashout-btn"  class="btn btn-primary rounded-full  mt-4 font-semibold">Withdraw Money</button>
        </fieldset>
      </div>
    </div>

  </section>










<script src="./script/cashout.js"></script>
</body>
</html>
